<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cardápio</title>
</head>
<body>
    <div class="botoes">
        <button>Mostrar tudo  <br> ForEach</button>
        <button>Mapear <br> Map</button>
        <button>Somar tudo <br> Reduce</button>
        <button>Filtrar <br> Filter</button>
    </div>
    
    <div class="cardapio">
        <div class="card">
            <img src="./img/xsalada.jpeg" alt="">
            <h2>X-Salada</h2>
            <p>R$ 30,00</p>
        </div>

        <div class="card">
            <img src="./img/xbacon.png" alt="">
            <h2>X-Bacon</h2>
            <p>R$ 34,00</p>
        </div>

        <div class="card">
            <img src="./img/bacon-egg.png" alt="">
            <h2>X-Bacon Egg</h2>
            <p>R$ 39,00</p>
        </div>

        <div class="card">
            <img src="./img/monstruoso.png" alt="">
            <h2>Monstruoso</h2>
            <p>R$ 50,00</p>
        </div>

        <div class="card">
            <img src="./img/monstruoso-vegan.png" alt="">
            <h2>Big Vegano</h2>
            <p>R$ 55,00</p>
        </div>

        <div class="card">
            <img src="./img/xvegan.png" alt="">
            <h2>X-Vegan</h2>
            <p>R$ 45,00</p>
        </div>
    </div>
</body>
</html>
